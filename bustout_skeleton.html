<script>

var BASE_URL = 'https://mericaltinors1983-max.github.io/LaFamilia/';

}
var _flSt=document.createElement('style');
_flSt.textContent='@keyframes _fl{0%{opacity:1;transform:translate(-50%,-50%)}100%{opacity:0;transform:translate(-50%,-200%)}}';
document.head.appendChild(_flSt);

/* ══ BUSTOUT ══ */
var BU_TI = null, BU_JI = null;

var BU_OK = 47;          // PLAYER.bustoutOk — toplam başarılı bustout
var BU_MX_RAF = null;
var BU_MX_CHARS = '0123456789ABCDEF⛓🔒'.split('');
var BU_ACTIVE_CITY = 'istanbul';  // şu an görüntülenen şehir
var BU_NEXT_ID = 900;             // unique prisoner id counter

// ── Şehir bazlı mahkum listeleri (backend gelene kadar mock) ──
var BU_CITY_PRISONERS = {
  istanbul:   [
    {id:1, nick:'GHOST_47',  rank:8,  fam:'CORLEONES', fc:'#f97316', t:83,  crime:'Armed Rob'},
    {id:2, nick:'DEAD_EYE',  rank:6,  fam:'CORLEONES', fc:'#f97316', t:45,  crime:'Offender'},
    {id:3, nick:'IRON_FIST', rank:4,  fam:null,        fc:null,      t:152, crime:'Inside Job'},
  ],
  izmir:      [
    {id:4, nick:'SHADOW_X',  rank:11, fam:'VIPERS',    fc:'#a78bfa', t:210, crime:'Felony'},
  ],
  napoli:     [
    {id:5, nick:'TNT_MIKE',  rank:9,  fam:null,        fc:null,      t:320, crime:'Felony'},
    {id:6, nick:'WHEELS_22', rank:7,  fam:'COSA NOSTRA',fc:'#3b82f6',t:67,  crime:'Wheelman'},
  ],
  newyork:    [
    {id:7, nick:'BIG_EASY',  rank:5,  fam:'FIVE FAM',  fc:'#22c55e', t:44,  crime:'Offender'},
  ],
  moskova:    [
    {id:8, nick:'IRON_BEAR', rank:10, fam:'RED SYNDICATE',fc:'#ef4444',t:180,crime:'Armed Rob'},
  ],
};

// Global jail state — suçlar buraya yazar
var JAIL_STATE = { active:false, time:30, suc:'', city:'' };

/* ── HAPİS KONTROLÜ — tüm suç açılışlarında kullan ── */
function isPlayerInJail() {
  return JAIL_STATE.active === true;
}

// ── Formül ──
function bu_calcBust(n){
  return Math.min(90, 15+Math.floor(n/10));
}
// NOT: Kendini bustout etme şansı da bu_calcBust(BU_OK) ile hesaplanır — rank tablosu YOKTUR
// Formül: min(%90, %15 + floor(başarılıSayısı/10))
function bu_fmt(s){var m=Math.floor(s/60),x=s%60;return m+':'+(x<10?'0':'')+x;}
function bu_fnum(n){return String(Math.round(n)).replace(/\B(?=(\d{3})+(?!\d))/g,'.');}
function bu_rnd(a){return a[Math.floor(Math.random()*a.length)];}

function bu_goSc(id){
  document.querySelectorAll('.bu-sc').forEach(function(s){s.classList.remove('on');});
  var el=document.getElementById(id);if(el)el.classList.add('on');
}

  var el=document.getElementById('bu-toast');if(!el)return;
  el.textContent=m;el.className=(t||'')+' show';
  clearTimeout(el._r);el._r=setTimeout(function(){el.className=t||'';},d||2000);
}

// ── Aktif şehrin mahkum listesini al ──
function bu_getPrisoners(){
  return BU_CITY_PRISONERS[BU_ACTIVE_CITY] || [];
}

// ── Beceri barı ──
function bu_updateSkill(){} // skill bar kaldırıldı

// ── Mahkum listesi ──
function bu_renderList(){
  var pl=document.getElementById('bu-plist');
  var em=document.getElementById('bu-empty');
  if(!pl)return;
  var list=bu_getPrisoners();
  // Şehir adını header'da göster
  var cityDisplayName=BU_ACTIVE_CITY.toUpperCase();
  if(!list.length){
    pl.style.display='none';em.style.display='flex';return;
  }
  pl.style.display='block';em.style.display='none';
  var sorted=list.slice().sort(function(a,b){
    if(a.isSelf) return -1; // kendin her zaman en üste
    if(b.isSelf) return 1;
    return b.t-a.t;
  });
  var html='';
  for(var i=0;i<sorted.length;i++){
    var p=sorted[i];
    var isSelf=(p.isSelf===true);
    var fb=p.fc?'<div class="bu-fbar" style="background:'+p.fc+'"></div>':'';
    var ft=p.fam
      ?'<span style="color:'+(p.fc||'#aaa')+';font-size:9px">'+p.fam+'</span>'
      :'<span style="color:#ccc;font-size:9px">FREELANCE</span>';
    var tc=p.t<60?' red':'';
    var bailAmt = bu_fnum((JAIL_STATE&&JAIL_STATE.time?JAIL_STATE.time:30)*50);
    var boChance = bu_calcBust ? bu_calcBust(BU_OK) : 20;
    var boHak = BU_HAK !== undefined ? BU_HAK : 3;
    var selfBadge=isSelf
      ?'<div style="display:flex;flex-direction:column;gap:3px;margin-left:auto;align-items:flex-end;">'       +'<span onclick="event.stopPropagation();bu_doBail()" style="font-family:\'Oswald\',sans-serif;font-size:9px;background:rgba(255,255,255,0.15);color:#fff;padding:2px 7px;border-radius:2px;letter-spacing:0.5px;cursor:pointer;">KEFALET $'+bailAmt+'</span>'       +'<span style="font-family:\'Bebas Neue\',sans-serif;font-size:9px;color:#C9A84C;letter-spacing:1px;">'+boChance+'% ŞANS '+boHak+'/3 HAK</span>'       +'</div>'
      :'';
    var clickAttr=isSelf?'onclick="bu_doBustOut()" style="cursor:pointer;"':'onclick="bu_doBust('+p.id+')"';
    var crimeTag=p.crime?'<span style="font-size:9px;color:#aaa;"> · '+p.crime+'</span>':'';
    var animalUrl='https://mericaltinors1983-max.github.io/LaFamilia/rank_animal_'+p.rank+'.png';
    var animalPic='<div class="bu-pico"><img src="'+animalUrl+'" style="width:28px;height:28px;object-fit:contain;" onerror="this.style.display=\'none\'"></div>';
    html+='<div class="bu-prow'+(isSelf?' bu-self-row':'')
      +'" id="bu-pr-'+p.id+'" '+clickAttr+'>'
      +fb
      +animalPic
      +(isSelf
        ?('<div class="bu-pinfo" style="flex:1;min-width:0;">'
         +'<div class="bu-pnick">SEN</div>'
         +'<div class="bu-pmeta">RANK '+p.rank+' &bull; '+ft+crimeTag+'</div>'
         +'</div>'+selfBadge)
        :('<div class="bu-pinfo">'
         +'<div class="bu-pnick">'+p.nick+'</div>'
         +'<div class="bu-pmeta">RANK '+p.rank+' &bull; '+ft+crimeTag+'</div>'
         +'</div>'))
      +(isSelf?'':'<div class="bu-ptmr'+tc+'" id="bu-tmr-'+p.id+'">'+bu_fmt(p.t)+'</div>')
      +'</div>';
  }
  pl.innerHTML=html;
}

// ── Başkasını bustout et ──
function bu_doBust(id){
  if(crimeGuard())return;
  var list=bu_getPrisoners();
  var p=null;
  for(var i=0;i<list.length;i++){if(list[i].id===id){p=list[i];break;}}
  if(!p||p.isSelf)return;
  var row=document.getElementById('bu-pr-'+p.id);
  if(row)row.classList.add('busy');
  var win=Math.random()*100<bu_calcBust(BU_OK);
  var nick=p.nick;
  setTimeout(function(){
    if(win){
      BU_OK++;
      if(BU_CITY_PRISONERS[BU_ACTIVE_CITY]){
        BU_CITY_PRISONERS[BU_ACTIVE_CITY]=BU_CITY_PRISONERS[BU_ACTIVE_CITY].filter(function(x){return x.id!==id;});
      }
      bu_updateSkill();
      bu_renderList();
    } else {
      if(row)row.classList.remove('busy');
      // Fail → sadece CEZA UZADI mesajı + hapse düş
      JAIL_STATE.city=BU_ACTIVE_CITY;
      bu_goJail(30,'Birini kurtarmaya çalışırken yakalandın.');
      bu_addSelfToPrison(BU_ACTIVE_CITY, 30);
      var uzadiEl=document.getElementById('bu-j-uzadi');
      if(uzadiEl){uzadiEl.textContent='CEZA +0:30 UZADI';uzadiEl.style.opacity='1';setTimeout(function(){uzadiEl.style.opacity='0';},3000);}
    }
  },350);
}

// ── PLAYER'ı şehir listesine ekle ──
function bu_addSelfToPrison(cityId, sec){
  if(!BU_CITY_PRISONERS[cityId])BU_CITY_PRISONERS[cityId]=[];
  // Önceki kaydı temizle
  BU_CITY_PRISONERS[cityId]=BU_CITY_PRISONERS[cityId].filter(function(p){return !p.isSelf;});
  BU_NEXT_ID++;
  BU_CITY_PRISONERS[cityId].unshift({
    id: BU_NEXT_ID,
    nick: (PLAYER&&PLAYER.nick)||'SEN',
    rank: (PLAYER&&PLAYER.rank)||1,
    fam:  (PLAYER&&PLAYER.familyName)||null,
    fc:   '#C9A84C',
    t:    sec,
    isSelf: true,
    crime: JAIL_STATE.suc||''
  });
}

// ── Hapis paneli göster (bu-sc-list üstünde) ──
function bu_goJail(sec,flavor){
  var zatenHapiste = JAIL_STATE.active && BU_JT > 0;
  if(zatenHapiste){
    BU_JT = BU_JT + sec;
    var uzadiEl = document.getElementById('bu-j-uzadi');
    if(uzadiEl){
      uzadiEl.textContent = 'CEZA +' + bu_fmt(sec) + ' UZADI';
      uzadiEl.style.opacity = '1';
      setTimeout(function(){ uzadiEl.style.opacity = '0'; }, 3000);
    }
  } else {
    BU_JT = sec;
    BU_HAK = 3;
  }
  var cityId=JAIL_STATE.city||BU_ACTIVE_CITY||(PLAYER&&PLAYER.city)||'istanbul';
  var cityName=cityId.toUpperCase();
  var rankName=(PLAYER&&PLAYER.rankName)?PLAYER.rankName.toUpperCase():'';
  var cEl=document.getElementById('bu-j-city');
  if(cEl)cEl.textContent=cityName+' — '+(rankName||'OPERATOR');
  var tmEl=document.getElementById('bu-j-tmr');if(tmEl)tmEl.textContent=bu_fmt(BU_JT);
  var blEl=document.getElementById('bu-j-bail');if(blEl)blEl.textContent=bu_fnum(BU_JT*50);
  var flEl=document.getElementById('bu-j-fl');
  if(!zatenHapiste && flEl)flEl.textContent='"'+(flavor||'Yakalandın.')+'"';
  var boEl=document.getElementById('bu-bo-pct');
  if(boEl)boEl.textContent=bu_calcBust(BU_OK)+'%';
  bu_updateHak();
  smPlaySfx('busted');
  // Kendi panelini göster, normal header'ı gizle, scroll'u aşağı kaydır
  var selfPanel = document.getElementById('bu-self-jail-panel');
  var normalHeader = document.getElementById('bu-list-header-normal');
  var listScroll = document.getElementById('bu-list-scroll');
  if(selfPanel){ selfPanel.style.display='flex'; }
  if(normalHeader){ normalHeader.style.display='none'; }
  // Liste scroll'u panel altında başlat
  if(listScroll){
    listScroll.style.display = 'block';
    // Panel yüksekliğini hesaplayıp listeyi aşağıda başlat
    setTimeout(function(){
      var ph = selfPanel ? selfPanel.offsetHeight : 200;
      listScroll.style.top = ph + 'px';
    }, 30);
  }
  bu_renderList();
  bu_startTI();
  bu_goSc('bu-sc-list');
  if(!zatenHapiste) bu_startJI();
  JAIL_STATE.active=true;
  // Listeyi de render et (kendimiz de görünsün)
  setTimeout(function(){
    bu_renderList();
    bu_startTI();
    var ls = document.getElementById('bu-list-scroll');
    var sp = document.getElementById('bu-self-jail-panel');
    if(ls && sp){ ls.style.top = sp.offsetHeight + 'px'; }
  }, 60);
}

function bu_startJI(){
  clearInterval(BU_JI);
  BU_JI=setInterval(function(){
    BU_JT--;
    var tmEl=document.getElementById('bu-j-tmr');if(tmEl)tmEl.textContent=bu_fmt(BU_JT);
    var blEl=document.getElementById('bu-j-bail');if(blEl)blEl.textContent=bu_fnum(Math.max(0,BU_JT*50));
    // Self prisoner timer da azalsın
    var cityId=JAIL_STATE.city||(PLAYER&&PLAYER.city)||'istanbul';
    var list=BU_CITY_PRISONERS[cityId];
    if(list){
      for(var i=0;i<list.length;i++){
        if(list[i].isSelf){list[i].t=BU_JT;break;}
      }
    }
    if(BU_JT<=0){clearInterval(BU_JI);bu_jailFree('Süren doldu, serbest kaldın!','green');}
  },1000);
}

function bu_updateHak(){
  for(var i=0;i<3;i++){
    var d=document.getElementById('bu-hd'+i);
    if(d)d.className='bu-hdot'+(i>=BU_HAK?' used':'');
  }
  var hEl=document.getElementById('bu-bo-hak');if(hEl)hEl.textContent=BU_HAK;
  var boBtn=document.getElementById('bu-j-bo');if(boBtn)boBtn.disabled=(BU_HAK<=0);
}

// ── Kendini break out et ──
function bu_doBustOut(){
  if(crimeGuard())return;
  if(BU_HAK<=0)return;
  var boBtn=document.getElementById('bu-j-bo');if(boBtn)boBtn.disabled=true;
  var win=Math.random()*100<bu_calcBust(BU_OK);
  if(win){
    BU_OK++;
    bu_removeSelfFromPrison();
    bu_jailFree('Kaçtın! +100 XP','green');
    bu_float('+100 XP','#f97316');
  } else {
    BU_HAK--;
    var ex=((PLAYER&&PLAYER.rank||1)<=5?20:(PLAYER&&PLAYER.rank||1)<=10?30:45);
    BU_JT+=ex;
    var tmEl=document.getElementById('bu-j-tmr');if(tmEl)tmEl.textContent=bu_fmt(BU_JT);
    var blEl=document.getElementById('bu-j-bail');if(blEl)blEl.textContent=bu_fnum(BU_JT*50);
    bu_updateHak();
    if(BU_HAK>0){var bb=document.getElementById('bu-j-bo');if(bb)bb.disabled=false;}
    // Ceza uzatma mesajı
    var uzadiEl=document.getElementById('bu-j-uzadi');
    if(uzadiEl){uzadiEl.textContent='CEZA +'+bu_fmt(ex)+' UZADI';uzadiEl.style.opacity='1';setTimeout(function(){uzadiEl.style.opacity='0';},3000);}
  }
}

function bu_doBail(){
  if(crimeGuard())return;
  if(!JAIL_STATE.active)return;
  bu_removeSelfFromPrison();
  bu_jailFree('Kefaletle çıktın! −$'+bu_fnum(BU_JT*50),'green');
}

function bu_removeSelfFromPrison(){
  var cityId=JAIL_STATE.city||(PLAYER&&PLAYER.city)||'istanbul';
  if(BU_CITY_PRISONERS[cityId]){
    BU_CITY_PRISONERS[cityId]=BU_CITY_PRISONERS[cityId].filter(function(p){return !p.isSelf;});
  }
}

function bu_jailFree(msg,type){
  clearInterval(BU_JI);
  JAIL_STATE.active=false;
  // Kendi panelini gizle, normal header'ı geri getir
  var sp=document.getElementById('bu-self-jail-panel');
  var nh=document.getElementById('bu-list-header-normal');
  var ls=document.getElementById('bu-list-scroll');
  if(sp)sp.style.display='none';
  if(nh)nh.style.display='flex';
  if(ls){ ls.style.display='block'; ls.style.top='158px'; }
  bu_renderList();
  bu_renderList(); // header da güncellenir
  bu_goSc('bu-sc-list');
  bu_toast(msg,type,2500);
}

// ── Popup aç — cityId opsiyonel (hapishane binasından gelince iletilir) ──

// ── Kendini kurtarma girişimi — listeden tıklayınca ──
function bu_selfEscape() {
  if(!JAIL_STATE.active) return;
  var flavor = JAIL_STATE.suc === 'bustout-fail'
    ? 'Birini kurtarmaya çalışırken yakalandın.'
    : 'Suç sırasında yakalandın.';
  bu_goJail(JAIL_STATE.time || 30, flavor);
}

function bu_open(cityId){
  clearInterval(BU_TI);clearInterval(BU_JI);
  BU_ACTIVE_CITY=cityId||(PLAYER&&PLAYER.city)||'istanbul';
  document.getElementById('bu-ov').style.display='flex';
  var pop=document.getElementById('bu-pop');
  var mx=document.getElementById('bu-mx');

  mx.style.display='block';
  pop.classList.add('open');
  pop.classList.remove('show');
  if(JAIL_STATE.active){
    // Hapisteyse → direkt YAKALANDIN ekranı
    var flavor = JAIL_STATE.suc === 'bustout-fail'
      ? 'Birini kurtarmaya çalışırken yakalandın.'
      : 'Suç sırasında yakalandın.';
    bu_goJail(JAIL_STATE.time || 30, flavor);
  } else {
    // Hapiste değilse → mahkum listesi
    var sp2=document.getElementById('bu-self-jail-panel');
    var nh2=document.getElementById('bu-list-header-normal');
    var ls2=document.getElementById('bu-list-scroll');
    if(sp2)sp2.style.display='none';
    if(nh2)nh2.style.display='flex';
    if(ls2){ls2.style.display='block';ls2.style.top='158px';}
    bu_goSc('bu-sc-list');
    bu_updateSkill();
    bu_renderList();
    bu_startTI();
  }
  bu_runSkeleton(mx,function(){
    mx.style.display='none';
    pop.classList.add('show');
  });
}

// ── Popup kapat ──
function bu_close(){
  clearInterval(BU_TI);clearInterval(BU_JI);
  document.getElementById('bu-mx').style.display='none';
  document.getElementById('bu-mx').style.opacity='1';
  document.getElementById('bu-ov').style.display='none';
  var pop=document.getElementById('bu-pop');
  pop.classList.remove('open');
  pop.classList.remove('show');
}

// ── setJail: suçlar çağırır → PLAYER şehir listesine eklenir ──
function bu_setJail(sec,suc,cityName){
  var cityId=cityName?cityName.toLowerCase().replace(/\s/g,'')
    :(PLAYER&&PLAYER.city)||'istanbul';
  JAIL_STATE.active = true;
  JAIL_STATE.time   = sec  || 30;
  JAIL_STATE.suc    = suc  || '';
  JAIL_STATE.city   = cityId;
  BU_JT  = JAIL_STATE.time;
  BU_HAK = 3;
  // PLAYER'ı o şehrin listesine ekle (diğerleri görsün)
  bu_addSelfToPrison(cityId, sec||30);
}

// ── Mahkum timer'ı (aktif şehir) ──
function bu_startTI(){
  clearInterval(BU_TI);
  BU_TI=setInterval(function(){
    var list=bu_getPrisoners();
    var changed=false;
    for(var i=0;i<list.length;i++){
      if(list[i].isSelf)continue; // kendi timerı JI yönetiyor
      list[i].t--;
      var el=document.getElementById('bu-tmr-'+list[i].id);
      if(el){el.textContent=bu_fmt(list[i].t);el.className='bu-ptmr'+(list[i].t<60?' red':'');}
      if(list[i].t<=0)changed=true;
    }
    if(changed){
      BU_CITY_PRISONERS[BU_ACTIVE_CITY]=(BU_CITY_PRISONERS[BU_ACTIVE_CITY]||[]).filter(function(p){return p.t>0||p.isSelf;});
      bu_renderList();
    }
  },1000);
}

function bu_showInfo(){}

function bu_float(txt,color){
  var el=document.createElement('div');
  el.className='bu-fl';el.textContent=txt;el.style.color=color;
  el.style.left=(window.innerWidth/2-60)+'px';
  el.style.top=(window.innerHeight-210)+'px';
  document.body.appendChild(el);
  setTimeout(function(){el.remove();},1700);
}

function bu_runSkeleton(el, cb){
  el.style.display='block';
  setTimeout(function(){
    // fade out skeleton
    el.style.transition='opacity 0.3s ease';
    el.style.opacity='0';
    setTimeout(function(){
      el.style.display='none';
      el.style.opacity='1';
      el.style.transition='';
      if(cb)cb();
    },300);
  },1100);
}
