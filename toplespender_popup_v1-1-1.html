<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>TOP SPENDER</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#555;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100dvh;font-family:'Oswald',sans-serif;gap:10px;}
.demo-row{display:flex;gap:6px;justify-content:center;padding:8px;flex-wrap:wrap;}
.open-btn{padding:8px 18px;background:rgba(0,0,0,.5);color:#fff;border:1px solid rgba(255,255,255,.3);font-family:'Oswald',sans-serif;font-weight:700;font-size:14px;letter-spacing:1px;cursor:pointer;}
.dt{padding:5px 12px;background:rgba(0,0,0,.35);color:#ccc;border:1px solid rgba(255,255,255,.2);font-family:'Oswald',sans-serif;font-weight:600;font-size:10px;letter-spacing:1px;cursor:pointer;}
.dt.on{background:#111;color:#C9A84C;border-color:#C9A84C;}

#ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:10000;}
#pop{display:none;position:fixed;bottom:116px;left:50%;transform:translateX(-50%);width:320px;height:520px;background:#fff;border:3px double #111;border-bottom:none;flex-direction:column;overflow:hidden;z-index:10001;}
#pop.open{display:flex;animation:su .25s cubic-bezier(.4,0,.2,1);}
@keyframes su{from{transform:translateX(-50%) translateY(640px);}to{transform:translateX(-50%) translateY(0);}}

/* HEADER */
#hd{height:64px;flex-shrink:0;background:#fff;border-bottom:3px double #111;display:flex;align-items:center;padding:0 10px;position:relative;}
#hd .center{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;}
#hd .center img{height:54px;max-width:180px;object-fit:contain;}
#hd .r{margin-left:auto;display:flex;align-items:center;gap:2px;position:relative;z-index:1;}
#hd .ib{background:none;border:none;cursor:pointer;padding:2px;display:flex;align-items:center;}
#hd .ib img{width:22px;height:22px;object-fit:contain;}

/* TABS */
#tab-bar{display:flex;border-bottom:2px solid #e0e0e0;flex-shrink:0;}
.tab{flex:1;padding:10px 4px;text-align:center;font-family:'Oswald',sans-serif;font-weight:700;font-size:11px;letter-spacing:1px;color:#999;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;}
.tab.active{color:#111;border-bottom:2px solid #111;}

/* SCREENS */
#screens{flex:1;position:relative;overflow:hidden;min-height:0;}
.sc{display:none;position:absolute;inset:0;background:#fff;flex-direction:column;overflow-y:auto;}
.sc.on{display:flex;}
.sc::-webkit-scrollbar{width:2px;}
.sc::-webkit-scrollbar-thumb{background:#ddd;}

/* SECTION LABEL */
.sec-lbl{font-family:'Oswald',sans-serif;font-weight:700;font-size:11px;color:#B8860B;letter-spacing:1.5px;padding:8px 12px 5px;display:block;border-bottom:1px solid #eee;background:#fffdf5;}

/* HERO */
.hero{background:#111;padding:14px 14px 12px;flex-shrink:0;}
.hero-title{font-family:'Oswald',sans-serif;font-weight:700;font-size:20px;color:#C9A84C;letter-spacing:2px;display:block;}
.hero-sub{font-family:'Oswald',sans-serif;font-weight:600;font-size:10px;color:#aaa;letter-spacing:1px;display:block;margin-top:3px;}
.hero-timer{display:flex;align-items:center;justify-content:space-between;margin-top:10px;padding-top:8px;border-top:1px solid #333;}
.ht-lbl{font-family:'Oswald',sans-serif;font-weight:600;font-size:10px;color:#888;}
.ht-val{font-family:'Oswald',sans-serif;font-weight:700;font-size:16px;color:#C9A84C;}

/* MY STATUS */
.my-status{display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid #eee;gap:12px;background:#fffdf5;}
.ms-rank{width:38px;height:38px;background:#111;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ms-rank-num{font-family:'Oswald',sans-serif;font-weight:700;font-size:16px;color:#C9A84C;}
.ms-body{flex:1;}
.ms-name{font-family:'Oswald',sans-serif;font-weight:700;font-size:13px;color:#111;display:block;}
.ms-sub{font-family:'Oswald',sans-serif;font-weight:600;font-size:10px;color:#888;display:block;margin-top:2px;}
.ms-spend{font-family:'Oswald',sans-serif;font-weight:700;font-size:18px;color:#111;}

/* LEADERBOARD */
.lb-row{display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid #f0f0f0;gap:12px;}
.lb-row.me{background:#fffbf0;border-left:3px solid #C9A84C;}
.lb-rank{width:32px;height:32px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.lb-rank.r1{background:linear-gradient(135deg,#B8860B,#f0d080);}
.lb-rank.r2{background:#888;}
.lb-rank.r3{background:#a0522d;}
.lb-rank.rn{background:#e0e0e0;}
.lb-rank-num{font-family:'Oswald',sans-serif;font-weight:700;font-size:13px;color:#fff;}
.lb-body{flex:1;}
.lb-name{font-family:'Oswald',sans-serif;font-weight:700;font-size:13px;color:#111;display:block;}
.lb-amt{font-family:'Oswald',sans-serif;font-weight:600;font-size:10px;color:#888;display:block;margin-top:1px;}
.lb-rew{text-align:right;flex-shrink:0;}
.lb-rew-val{font-family:'Oswald',sans-serif;font-weight:700;font-size:12px;color:#2a7a3a;display:block;}
.lb-rew-lbl{font-family:'Oswald',sans-serif;font-weight:600;font-size:9px;color:#aaa;display:block;margin-top:1px;}

/* MILESTONE */
.ms-section{padding:10px 12px 6px;border-bottom:1px solid #eee;}
.ms-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;}
.ms-lbl{font-family:'Oswald',sans-serif;font-weight:700;font-size:12px;color:#111;letter-spacing:.5px;}
.ms-val{font-family:'Oswald',sans-serif;font-weight:700;font-size:22px;color:#111;}
.ms-bar-bg{height:10px;background:#eee;border:1px solid #ddd;border-radius:2px;position:relative;margin-bottom:5px;}
.ms-bar-fill{height:100%;background:linear-gradient(90deg,#B8860B,#C9A84C);border-radius:2px;transition:width .3s;}
.ms-next{font-family:'Oswald',sans-serif;font-weight:600;font-size:10px;color:#888;}

.milestone-row{display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid #f0f0f0;gap:12px;}
.milestone-row.unlocked{background:#f9fff9;}
.ms-ico{width:38px;height:38px;border:2px solid #ddd;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;background:#fafafa;}
.ms-ico.done{background:#f0faf0;border-color:#b2dfdb;}
.ms-ico.active{border-color:#111;background:#fff;}
.ms-ico.locked{opacity:.35;}
.ms-body2{flex:1;}
.ms-title{font-family:'Oswald',sans-serif;font-weight:700;font-size:12px;color:#111;display:block;}
.ms-req{font-family:'Oswald',sans-serif;font-weight:600;font-size:10px;color:#888;display:block;margin-top:2px;}
.ms-odul{font-family:'Oswald',sans-serif;font-weight:700;font-size:13px;color:#2a7a3a;text-align:right;flex-shrink:0;}
.ms-odul.locked-txt{color:#ccc;}
.ms-claim-btn{padding:6px 12px;border:none;background:#111;color:#fff;font-family:'Oswald',sans-serif;font-weight:700;font-size:11px;letter-spacing:1px;cursor:pointer;flex-shrink:0;}
.ms-claim-btn.done{background:#e8e8e8;color:#888;cursor:default;}

/* NOTE */
.note{margin:6px 12px 8px;padding:8px 10px;border:1px solid #eee;background:#fafafa;}
.note-txt{font-family:'Oswald',sans-serif;font-weight:600;font-size:10px;color:#777;line-height:1.6;}

/* BOTTOM */
#bot{flex-shrink:0;border-top:3px double #111;}
#bot button{width:100%;padding:8px;background:#fff;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;}
#bot button img{width:50px;height:50px;object-fit:contain;}
#toast{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);background:#111;color:#fff;font-family:'Oswald',sans-serif;font-weight:600;font-size:11px;letter-spacing:.5px;padding:8px 16px;white-space:nowrap;opacity:0;transition:opacity .2s;pointer-events:none;z-index:200;}
#toast.show{opacity:1;}
#toast.green{background:#2a7a3a;}
.bot-sim{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:320px;height:116px;background:#111;display:flex;align-items:center;justify-content:center;z-index:9999;}
.bot-sim-txt{font-family:'Oswald',sans-serif;font-weight:600;font-size:9px;color:#444;letter-spacing:2px;}
</style>
</head>
<body>
<div class="demo-row">
  <button class="open-btn" onclick="acPopup()">TOP SPENDER</button>
</div>
<div class="demo-row">
  <button class="dt on" id="dt-yeni"  onclick="setDemo('yeni',this)">YENI OYUNCU</button>
  <button class="dt"    id="dt-mid"   onclick="setDemo('mid',this)">ORTA</button>
  <button class="dt"    id="dt-top"   onclick="setDemo('top',this)">TOP 3</button>
</div>
<div id="ov" onclick="closePop()"></div>
<div class="bot-sim"><span class="bot-sim-txt">BOTTOM BAR</span></div>

<div id="pop">
  <div id="hd">
    <span style="font-size:22px;position:relative;z-index:1;">&#11088;</span>
    <div class="center">
      <img src="https://mericaltinors1983-max.github.io/hustler/lafamilia-2.png" onerror="this.style.display='none'">
    </div>
    <div class="r">
      <button class="ib"><img src="https://mericaltinors1983-max.github.io/hustler/info2.png" onerror="this.outerHTML='<span style=color:#888;font-size:15px>i</span>'"></button>
      <button class="ib" onclick="closePop()"><img src="https://mericaltinors1983-max.github.io/hustler/close1.png" onerror="this.outerHTML='<span style=color:#555;font-size:17px>X</span>'"></button>
    </div>
  </div>

  <div id="tab-bar">
    <div class="tab active" onclick="switchTab('siralama',this)">SIRALAMA</div>
    <div class="tab" onclick="switchTab('milestone',this)">ODULLER</div>
  </div>

  <div id="screens">
    <div class="sc on" id="sc-siralama"></div>
    <div class="sc" id="sc-milestone"></div>
  </div>

  <div id="bot">
    <button onclick="closePop()">
      <img src="https://mericaltinors1983-max.github.io/hustler/close_icon.png" onerror="this.outerHTML='<span style=font-size:20px>X</span>'">
    </button>
  </div>
  <div id="toast"></div>
</div>

<script>
var DEMO = 'yeni';

var DEMOS = {
  yeni: { rank:47, harcama:0.99,   isim:'PLAYER_NEW' },
  mid:  { rank:12, harcama:19.99,  isim:'DARK_BLADE'  },
  top:  { rank:2,  harcama:99.99,  isim:'SHADOW_X'    }
};

var LEADERBOARD = [
  { rank:1,  isim:'CORLEONE_DON',  harcama:'$149.97',  odul:'$10M + OZEL UNVAN + T5 NADIR ITEM' },
  { rank:2,  isim:'SHADOW_X',      harcama:'$99.99',   odul:'$5M + T5 BG + OZEL ROZET'          },
  { rank:3,  isim:'IRON_FIST',     harcama:'$79.98',   odul:'$2M + T4 BG + VIP 30 GUN'          },
  { rank:4,  isim:'THE_BOSS',      harcama:'$59.97',   odul:'$1M + VIP 14 GUN'                  },
  { rank:5,  isim:'GODFATHER_K',   harcama:'$49.99',   odul:'$500K + VIP 7 GUN'                 },
];

var MILESTONES = [
  { id:0, ikon:'&#128181;', baslik:'ILK SATIN ALIM',     hedef:0.99,  odul:'$100K + VIP 1 GUN',   claimed:false },
  { id:1, ikon:'&#127873;', baslik:'$4.99 VEYA UZERI',   hedef:4.99,  odul:'$500K + VIP 3 GUN',   claimed:false },
  { id:2, ikon:'&#128142;', baslik:'$9.99 VEYA UZERI',   hedef:9.99,  odul:'$1M + T2 BG KAFASI',  claimed:false },
  { id:3, ikon:'&#11088;',  baslik:'$19.99 VEYA UZERI',  hedef:19.99, odul:'$2M + T3 BG + ROZET', claimed:false },
  { id:4, ikon:'&#128081;', baslik:'$49.99 VEYA UZERI',  hedef:49.99, odul:'$5M + T4 BG + UNVAN', claimed:false },
  { id:5, ikon:'&#128081;', baslik:'$99.99 VEYA UZERI',  hedef:99.99, odul:'$10M+T5 BG+NADIR ITEM',claimed:false},
];

function renderSiralama() {
  var sc = document.getElementById('sc-siralama');
  if (!sc) return;
  var player = DEMOS[DEMO];
  var html = '';

  // hero
  html += '<div class="hero">';
  html += '<span class="hero-title">TOP SPENDER</span>';
  html += '<span class="hero-sub">AYLIK HARCAMA SIRALAMASINDA YER AL - OZEL ODULLER KAZAN</span>';
  html += '<div class="hero-timer">';
  html += '<span class="ht-lbl">AY BITIS</span>';
  html += '<span class="ht-val">22G 14SA 08DK</span>';
  html += '</div></div>';

  // my status
  html += '<div class="my-status">';
  html += '<div class="ms-rank"><span class="ms-rank-num">' + player.rank + '</span></div>';
  html += '<div class="ms-body">';
  html += '<span class="ms-name">SEN (' + player.isim + ')</span>';
  html += '<span class="ms-sub">Bu ay toplam harcama</span>';
  html += '</div>';
  html += '<span class="ms-spend">$' + player.harcama.toFixed(2) + '</span>';
  html += '</div>';

  // leaderboard
  html += '<span class="sec-lbl">AYLIK SIRALAMA - ODULLER</span>';
  var shown = false;
  for (var i = 0; i < LEADERBOARD.length; i++) {
    var e = LEADERBOARD[i];
    var isMe = (DEMO === 'top' && e.rank === 2) || (DEMO === 'mid' && e.rank === 3);
    var rankCls = e.rank === 1 ? 'r1' : e.rank === 2 ? 'r2' : e.rank === 3 ? 'r3' : 'rn';
    html += '<div class="lb-row' + (isMe ? ' me' : '') + '">';
    html += '<div class="lb-rank ' + rankCls + '"><span class="lb-rank-num">' + e.rank + '</span></div>';
    html += '<div class="lb-body">';
    html += '<span class="lb-name">' + (isMe ? 'SEN (' + e.isim + ')' : e.isim) + '</span>';
    html += '<span class="lb-amt">' + e.harcama + ' harcandi</span>';
    html += '</div>';
    html += '<div class="lb-rew">';
    html += '<span class="lb-rew-val">' + e.odul.split('+')[0] + '</span>';
    html += '<span class="lb-rew-lbl">+ ' + (e.odul.split('+').length - 1) + ' ODUL DAHA</span>';
    html += '</div></div>';
  }

  // player rank if not in top 5
  if (DEMO === 'yeni') {
    html += '<div class="lb-row me">';
    html += '<div class="lb-rank rn"><span class="lb-rank-num">47</span></div>';
    html += '<div class="lb-body">';
    html += '<span class="lb-name">SEN (' + player.isim + ')</span>';
    html += '<span class="lb-amt">$0.99 harcandi</span>';
    html += '</div>';
    html += '<div class="lb-rew"><span class="lb-rew-lbl" style="color:#aaa;">Top 5e gir!</span></div>';
    html += '</div>';
  }

  html += '<div class="note"><span class="note-txt">Her ayin son gunu oduller dagitilir. Siralama gercek zamanli guncellenir. Esit harcamada ilk alin onceligine gore siralanir.</span></div>';
  sc.innerHTML = html;
}

function renderMilestone() {
  var sc = document.getElementById('sc-milestone');
  if (!sc) return;
  var player = DEMOS[DEMO];
  var html = '';
  var toplam = player.harcama;
  var sonrakiIdx = -1;

  // toplam harcama bar
  var maxBar = 99.99;
  var pct = Math.min(100, Math.round(toplam / maxBar * 100));
  var nextMs = null;
  for (var i = 0; i < MILESTONES.length; i++) {
    if (toplam < MILESTONES[i].hedef) { nextMs = MILESTONES[i]; sonrakiIdx = i; break; }
  }

  html += '<div class="ms-section">';
  html += '<div class="ms-header">';
  html += '<span class="ms-lbl">TOPLAM HARCAMA</span>';
  html += '<span class="ms-val">$' + toplam.toFixed(2) + '</span>';
  html += '</div>';
  html += '<div class="ms-bar-bg"><div class="ms-bar-fill" style="width:' + pct + '%"></div></div>';
  if (nextMs) {
    html += '<span class="ms-next">Sonraki odul: $' + nextMs.hedef.toFixed(2) + '\'de</span>';
  } else {
    html += '<span class="ms-next" style="color:#2a7a3a;">Tum oduller kazanildi!</span>';
  }
  html += '</div>';

  html += '<span class="sec-lbl">HARCAMA ODULLERI</span>';

  for (var i = 0; i < MILESTONES.length; i++) {
    var m = MILESTONES[i];
    var unlocked = toplam >= m.hedef;
    var claimable = unlocked && !m.claimed;
    var icoCls = m.claimed ? 'done' : claimable ? 'active' : 'locked';
    html += '<div class="milestone-row' + (unlocked ? ' unlocked' : '') + '">';
    html += '<div class="ms-ico ' + icoCls + '">' + m.ikon + '</div>';
    html += '<div class="ms-body2">';
    html += '<span class="ms-title">' + m.baslik + '</span>';
    html += '<span class="ms-req">' + m.odul + '</span>';
    html += '</div>';
    if (m.claimed) {
      html += '<button class="ms-claim-btn done">ALINDI</button>';
    } else if (claimable) {
      html += '<button class="ms-claim-btn" onclick="claimMs(' + i + ')">AL</button>';
    } else {
      html += '<span class="ms-odul locked-txt">KILITLI</span>';
    }
    html += '</div>';
  }

  html += '<div class="note"><span class="note-txt">Odemelerin dogrulanmasi sonrasi oduller aninda hesabiniza aktarilir. Her milestone bir kez kazanilir. Yeni aya gecince sifirlanmaz.</span></div>';
  sc.innerHTML = html;
}

function claimMs(idx) {
  MILESTONES[idx].claimed = true;
  toast('Odul alindi: ' + MILESTONES[idx].odul, 'green');
  renderMilestone();
}

function switchTab(id, el) {
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
  el.classList.add('active');
  document.querySelectorAll('.sc').forEach(function(s){ s.classList.remove('on'); });
  document.getElementById('sc-' + id).classList.add('on');
}

function acPopup() {
  renderSiralama(); renderMilestone();
  document.getElementById('ov').style.display = 'block';
  document.getElementById('pop').classList.add('open');
}

function closePop() {
  document.getElementById('ov').style.display = 'none';
  document.getElementById('pop').classList.remove('open');
}

function setDemo(mode, el) {
  DEMO = mode;
  MILESTONES.forEach(function(m){ m.claimed = false; });
  document.querySelectorAll('.dt').forEach(function(b){ b.classList.remove('on'); });
  el.classList.add('on');
  renderSiralama(); renderMilestone();
}

function toast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = (type || '') + ' show';
  clearTimeout(t._r);
  t._r = setTimeout(function(){ t.className = ''; }, 2600);
}
</script>
</body>
</html>
